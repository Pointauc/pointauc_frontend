server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets — cache aggressively
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else falls back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
